<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan2Cook – Email bestätigen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
      margin-bottom: 32px;
    }

    .logo span {
      color: #2563eb;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 14px;
      color: #111;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-block;
      background: #2563eb;
      color: #ffffff;
      font-size: 1.15rem;
      font-weight: 600;
      padding: 16px 40px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:hover  { background: #1d4ed8; }
    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #e53e3e;
      min-height: 20px;
    }

    /* ── Erfolgsseite ── */
    .success-page {
      display: none;
      text-align: center;
    }

    .checkmark {
      width: 64px;
      height: 64px;
      background: #2563eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .checkmark svg {
      width: 32px;
      height: 32px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .success-page h1 {
      font-size: 1.6rem;
      margin-bottom: 14px;
    }

    .success-page p {
      margin-bottom: 0;
    }

    /* ── Fehler-Page ── */
    .error-page {
      display: none;
      text-align: center;
    }

    .error-icon {
      width: 64px;
      height: 64px;
      background: #e53e3e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .error-icon svg {
      width: 32px;
      height: 32px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .error-page h1 { color: #e53e3e; }
    .error-page p  { margin-bottom: 24px; }

    .btn-retry {
      background: #111;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-retry:hover { background: #333; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1    { font-size: 1.35rem; }
      .btn  { font-size: 1.05rem; padding: 15px 24px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- ── Hauptansicht ── -->
  <div id="main-view">
    <div class="logo">Scan2<span>Cook</span></div>
    <h1>Bei Scan2Cook registrieren</h1>
    <p>Klicke auf den Button um deine E‑Mail‑Adresse zu bestätigen und die Registrierung abzuschließen.</p>
    <button class="btn" id="confirm-btn" onclick="confirmEmail()">Jetzt Registrieren</button>
    <div class="status" id="status-msg"></div>
  </div>

  <!-- ── Erfolgsansicht ── -->
  <div id="success-view" class="success-page">
    <div class="checkmark">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Registrierung erfolgreich</h1>
    <p>Sie können diese Seite jetzt schließen.</p>
  </div>

  <!-- ── Fehleransicht ── -->
  <div id="error-view" class="error-page">
    <div class="error-icon">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h1>Fehler beim Registrieren</h1>
    <p id="error-detail">Der Bestätigungslink ist ungültig oder abgelaufen.</p>
    <button class="btn-retry" onclick="location.reload()">Erneut versuchen</button>
  </div>

</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://ohxdromccjjlpjnnkrvf.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_kAPbpJ2MAD3kSnYXx-eQNQ_7gcR_H87';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  /* ── Beim Laden: prüfen ob bereits ein Token in der URL steckt ──
     Supabase schickt nach E‑Mail‑Bestätigung z. B.
     ?token_hash=...&type=email  ODER  #access_token=...
     In beiden Fällen können wir die Session direkt auflösen.          */
  window.addEventListener('load', async () => {
    const params = new URLSearchParams(window.location.search);
    const hash   = new URLSearchParams(window.location.hash.replace('#', ''));

    const tokenHash = params.get('token_hash');
    const type      = params.get('type');          // "email" oder "signup"
    const accessToken  = hash.get('access_token');
    const refreshToken = hash.get('refresh_token');

    if (tokenHash && type) {
      // Neues OTP-Flow (Supabase ≥ 2.x)
      autoConfirm(tokenHash, type);
    } else if (accessToken) {
      // Legacy implicit flow
      autoConfirmLegacy(accessToken, refreshToken);
    }
    // Kein Token → Nutzer drückt selbst den Button (manuell)
  });

  /* Automatische Bestätigung via OTP-Token in der URL */
  async function autoConfirm(tokenHash, type) {
    setLoading(true);
    const { error } = await supabase.auth.verifyOtp({ token_hash: tokenHash, type });
    setLoading(false);
    error ? showError(error.message) : showSuccess();
  }

  /* Automatische Bestätigung via Legacy-Token */
  async function autoConfirmLegacy(access, refresh) {
    setLoading(true);
    const { error } = await supabase.auth.setSession({ access_token: access, refresh_token: refresh });
    setLoading(false);
    error ? showError(error.message) : showSuccess();
  }

  /* Manueller Button-Klick – versucht aktive Session abzufragen */
  async function confirmEmail() {
    setLoading(true);
    const { data, error } = await supabase.auth.getSession();
    setLoading(false);

    if (error)              return showError(error.message);
    if (data?.session)      return showSuccess();

    showError('Kein gültiger Bestätigungslink gefunden. Bitte öffne den Link aus deiner E‑Mail erneut.');
  }

  /* ── Hilfsfunktionen ── */
  function setLoading(on) {
    const btn = document.getElementById('confirm-btn');
    const msg = document.getElementById('status-msg');
    btn.disabled  = on;
    btn.textContent = on ? 'Wird bestätigt …' : 'Jetzt Registrieren';
    if (!on) msg.textContent = '';
  }

  function showSuccess() {
    document.getElementById('main-view').style.display    = 'none';
    document.getElementById('success-view').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('main-view').style.display   = 'none';
    document.getElementById('error-view').style.display  = 'block';
    document.getElementById('error-detail').textContent  =
      msg || 'Der Bestätigungslink ist ungültig oder abgelaufen.';
  }
</script>

</body>
</html>
